name = "testnet-small"
description = "Topology with 6 geo-distributed validators, 2 sentries, 1 RPC full node, 1 snapshot node, 1 arc node."

# ==============================================================================
# GLOBAL CONFIGURATION
# ==============================================================================
el.config.engine.legacy_state_root = true

cl.config.discovery_num_inbound_peers = 50
cl.config.discovery_num_outbound_peers = 50

latency_emulation = true
engine_api_connection = "rpc"
monitoring_bind_host = "0.0.0.0"

# ==============================================================================
# NODE GROUPS
# ==============================================================================

[node_groups]
CORE_VALIDATORS = ["validator1", "validator2", "validator3", "validator4", "validator5"]
RPC_NODES = ["rpc-full", "arc-node"]

# ==============================================================================
# TOPOLOGY
#
#       [private1]          [public]         [private2]
#   validator1 ──┐
#   validator2 ──┤
#   validator3 ──┼── sentry-1 ──── sentry-2 ──── validator6
#   validator4 ──┤       │  \
#   validator5 ──┘       │   ------
#                        |         |
#                     rpc-full    snapshot
#                        |         |
#                        |   ------
#                        |  /
#                     arc-node
# ==============================================================================

# --- Core validators (5 across 5 regions) on private1 ---
# Explicit peering among validators guarantees eager push regardless of mesh_n.

[nodes.validator1]
region = "us-east-2"
subnets = ["private1"]
cl_persistent_peers = ["CORE_VALIDATORS"]
cl_gossipsub.explicit_peering = true
el.config.trusted_peers = ["CORE_VALIDATORS"]

[nodes.validator2]
region = "us-west-2"
subnets = ["private1"]
cl_persistent_peers = ["CORE_VALIDATORS"]
cl_gossipsub.explicit_peering = true
el.config.trusted_peers = ["CORE_VALIDATORS"]

[nodes.validator3]
region = "eu-central-1"
subnets = ["private1"]
cl_persistent_peers = ["CORE_VALIDATORS"]
cl_gossipsub.explicit_peering = true
el.config.trusted_peers = ["CORE_VALIDATORS"]

[nodes.validator4]
region = "ap-northeast-1"
subnets = ["private1"]
cl_persistent_peers = ["CORE_VALIDATORS"]
cl_gossipsub.explicit_peering = true
el.config.trusted_peers = ["CORE_VALIDATORS"]

[nodes.validator5]
region = "eu-west-1"
subnets = ["private1"]
cl_persistent_peers = ["CORE_VALIDATORS"]
cl_gossipsub.explicit_peering = true
el.config.trusted_peers = ["CORE_VALIDATORS"]

# --- Sentries ---
# Asymmetric: sentries use mesh prioritization + high load instead of explicit peering
# (explicit peering would cause sentries to PRUNE GRAFTs from validators).

[nodes.sentry-1]
region = "us-east-2"
subnets = ["private1", "public"]
cl_persistent_peers = ["sentry-2", "CORE_VALIDATORS"]
cl_gossipsub.mesh_prioritization = true
cl_gossipsub.load = "high"
el.config.trusted_peers = ["sentry-2", "CORE_VALIDATORS"]
el.config.disable_discovery = true

[nodes.sentry-2]
region = "eu-central-1"
subnets = ["public", "private2"]
external = true
start_at = 25
cl_persistent_peers = ["sentry-1", "validator6"]
cl_gossipsub.mesh_prioritization = true
cl_gossipsub.load = "high"
el.config.trusted_peers = ["sentry-1", "validator6"]
el.config.disable_discovery = true

# --- External validator connected via sentry chain on private2 ---

[nodes.validator6]
region = "ap-southeast-1"
subnets = ["private2"]
external = true
start_at = 30
cl_persistent_peers = []
el.config.trusted_peers = []

# --- RPC full node (non-validator, externally exposed) ---

[nodes.rpc-full]
region = "us-west-2"
subnets = ["public"]
external = true
start_at = 25
cl_persistent_peers = ["sentry-1"]
el.config.trusted_peers = ["sentry-1"]
el.config.tx_propagation_policy = "Trusted"
el.config.disable_discovery = true
el.config.http.api = ["eth", "net", "web3"]
el.config.ws.api = ["eth", "net", "web3"]
el.config.prune.preset = "full"
el.config.arc.hide_pending_txs = true

# --- Snapshot node (full profile, snapshot source) ---

[nodes.snapshot]
region = "us-east-2"
subnets = ["public"]
external = true
start_at = 30
cl_persistent_peers = ["sentry-1"]
cl.config.no_consensus = true
cl.config.prune_certificates_distance = 100
el.config.trusted_peers = ["sentry-1"]
el.config.disable_discovery = true
el.config.prune.preset = "full"

# --- Arc node (RPC follow from rpc-full and snapshot) ---

[nodes.arc-node]
region = "us-east-2"
subnets = ["public"]
external = true
start_at = 30
follow = true
follow_endpoints = ["rpc-full"]
el.config.trusted_peers = ["rpc-full"]
el.config.prune.preset = "full"
el.config.rpc.forwarder = "http://sentry-1_el:8545"
